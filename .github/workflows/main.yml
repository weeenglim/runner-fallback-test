name: Hello World Fallback (PowerShell, 1-min timeout)

on:
  workflow_dispatch:

jobs:
  self_hosted:
    name: Try self-hosted runner
    runs-on: [self-hosted, windows]
    continue-on-error: true
    timeout-minutes: 1  # <- stops after 1 minute if offline

    steps:
      - name: Say Hello (Self-Hosted)
        run: |
          Write-Host "Hello World from self-hosted runner!"
          Write-Host "Runner: $env:RUNNER_NAME"
          Write-Host "OS: $env:RUNNER_OS"

  github_runner:
    name: Fallback to GitHub-hosted
    runs-on: windows-latest
    needs: self_hosted
    if: ${{ needs.self_hosted.result != 'success' }}

    steps:
      - name: Say Hello (GitHub Runner)
        run: |
          Write-Host "Hello World from GitHub-hosted runner!"
          Write-Host "Runner: $env:RUNNER_NAME"
          Write-Host "OS: $env:RUNNER_OS"
