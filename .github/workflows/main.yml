# Check that your token exists
if (-not $env:GITHUB_TOKEN) {
    Write-Host "GITHUB_TOKEN not set. Please set it first."
    exit
}

$token = $env:GITHUB_TOKEN
$headers = @{
    Authorization = "token $token"
    "User-Agent" = "PowerShell"
}

# Simple API call to get your user info
$url = "https://api.github.com/user"

try {
    $response = Invoke-RestMethod -Headers $headers -Uri $url -Method Get
    Write-Host "GitHub API is working!"
    Write-Host "Authenticated as: $($response.login)"
} catch {
    Write-Host "API call failed: $($_.Exception.Message)"
}
