name: Test GitHub API

on:
  workflow_dispatch: # lets you run it manually

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Test GitHub API with PowerShell
        shell: pwsh
        run: |
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $headers = @{
              Authorization = "token $token"
              "User-Agent"  = "PowerShell"
          }

          $url = "https://api.github.com/user"

          try {
              $response = Invoke-RestMethod -Headers $headers -Uri $url -Method Get
              Write-Host "✅ GitHub API is working!"
              Write-Host "Authenticated as: $($response.login)"
          } catch {
              Write-Host "❌ API call failed: $($_.Exception.Message)"
              exit 1
          }
