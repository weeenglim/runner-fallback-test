name: Test GitHub API

on:
  workflow_dispatch: # lets you run it manually

jobs:
  self-hosted-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check self-hosted runners
        shell: pwsh
        run: |
          $token = "${{ secrets.MY_GITHUB_PAT }}"
          $headers = @{
              Authorization = "token $token"
              "User-Agent"  = "PowerShell"
          }

          $repo = "${{ github.repository }}"
          $url = "https://api.github.com/repos/$repo/actions/runners"

          try {
              $runners = Invoke-RestMethod -Headers $headers -Uri $url -Method Get
              Write-Host "Total runners: $($runners.total_count)"
          } catch {
              Write-Host "API call failed: $($_.Exception.Message)"
              exit 1
          }
