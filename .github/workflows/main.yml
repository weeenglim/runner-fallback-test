name: Hello World Self-Hosted with Fallback

on:
  workflow_dispatch:

permissions:
  actions: read  # Needed to list self-hosted runners via API

jobs:
  check_runner:
    name: Check self-hosted runner
    runs-on: windows-latest
    outputs:
      self_hosted_available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        run: |
          Write-Host "Checking if self-hosted runner is online..."
          
          # Query the GitHub API for self-hosted runners
          $runners = Invoke-RestMethod -Headers @{Authorization = "Bearer $env:GITHUB_TOKEN"} `
                                        -Uri "https://api.github.com/repos/${env:GITHUB_REPOSITORY}/actions/runners"
          
          # Safely filter for online self-hosted runner
          $online = @($runners.runners | Where-Object { 
              $_.status -eq "online" -and $_.labels -ne $null -and $_.labels.name -contains "self-hosted" 
          })

          if ($online.Count -gt 0) {
              Write-Host "Self-hosted runner is available"
              echo "::set-output name=available::true"
          } else {
              Write-Host "No self-hosted runner available"
              echo "::set-output name=available::false"
          }

          exit 0  # ensures the step never fails

  self_hosted_job:
    name: Run on Self-Hosted Runner
    runs-on: [self-hosted, windows]
    needs: check_runner
    if: ${{ needs.check_runner.outputs.self_hosted_available == 'true' }}
    timeout-minutes: 1  # fast test
    steps:
      - name: Hello from Self-Hosted
        run: |
          Write-Host "Hello World from self-hosted runner!"
          Write-Host "Runner: $env:RUNNER_NAME"
          Write-Host "OS: $env:RUNNER_OS"

  fallback_job:
    name: Fallback to GitHub Runner
    runs-on: windows-latest
    needs: check_runner
    if: ${{ needs.check_runner.outputs.self_hosted_available == 'false' }}
    steps:
      - name: Hello from GitHub-hosted
        run: |
          Write-Host "Hello World from GitHub-hosted runner!"
          Write-Host "Runner: $env:RUNNER_NAME"
          Write-Host "OS: $env:RUNNER_OS"
