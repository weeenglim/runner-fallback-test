name: Hello World - Self-Hosted Check

on:
  workflow_dispatch:

jobs:
  check-self-hosted:
    runs-on: windows-latest
    outputs:
      runner_type: ${{ steps.set_runner_type.outputs.runner_type }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check for self-hosted runners
        id: set_runner_type
        shell: pwsh
        run: |
          $token = "${{ secrets.MY_GITHUB_PAT }}"
          $headers = @{
              Authorization = "token $token"
              "User-Agent"  = "PowerShell"
          }

          $repo = "${{ github.repository }}"
          $url = "https://api.github.com/repos/$repo/actions/runners"

          try {
              $runners = Invoke-RestMethod -Headers $headers -Uri $url -Method Get
              $onlineRunners = $runners.runners | Where-Object { $_.status -eq "online" -and $_.labels.name -contains "self-hosted" }

              if ($onlineRunners.Count -gt 0) {
                  Write-Host "Self-hosted runner found: $($onlineRunners[0].name)"
                  echo "::set-output name=runner_type::self-hosted"
              } else {
                  Write-Host "No self-hosted runner online. Will fallback to GitHub-hosted runner."
                  echo "::set-output name=runner_type::windows-latest"
              }
          } catch {
              Write-Host "API call failed: $($_.Exception.Message)"
              echo "::set-output name=runner_type::windows-latest"
          }

  hello-world:
    needs: check-self-hosted
    runs-on: ${{ needs.check-self-hosted.outputs.runner_type }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Hello World
        run: |
          Write-Host "Hello World!"
          Write-Host "Running on: ${{ runner.os }} runner"
