name: Hello World Self-Hosted with Fallback (Timeout Version)

on:
  workflow_dispatch:

jobs:
  self_hosted_job:
    name: Run on Self-Hosted Runner
    runs-on: [self-hosted, windows]
    timeout-minutes: 1  # Timeout after 1 minute if self-hosted runner doesn't pick up
    continue-on-error: true  # Allow fallback if self-hosted fails to run
    steps:
      - name: Hello from Self-Hosted
        run: |
          Write-Host "Hello World from self-hosted runner!"
          Write-Host "Runner: $env:RUNNER_NAME"
          Write-Host "OS: $env:RUNNER_OS"

  fallback_job:
    name: Fallback to GitHub Runner
    runs-on: windows-latest
    needs: self_hosted_job
    if: ${{ always() && needs.self_hosted_job.result == 'failure' }}
    timeout-minutes: 1  # Optional: Timeout for the fallback job as well
    steps:
      - name: Hello from GitHub-hosted
        run: |
          Write-Host "Hello World from GitHub-hosted runner!"
          Write-Host "Runner: $env:RUNNER_NAME"
          Write-Host "OS: $env:RUNNER_OS"
